app = "horus-api"
primary_region = "cdg"

[build]
  # Contexto = raíz del repo, igual que docker-compose: el Dockerfile hace
  # `COPY backend ./backend` para que los imports `from backend.…` funcionen.
  dockerfile = "backend/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # NO se duerme: apscheduler corre los escaneos programados y debe estar siempre
  # vivo. Por eso auto_stop=false y al menos una máquina encendida.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
