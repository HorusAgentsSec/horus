<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Fallback CSP that ships with the build. NOTE: `frame-ancestors`,
         X-Frame-Options and X-Content-Type-Options are intentionally absent —
         the browser ignores them in a <meta> tag, so they are delivered as
         real HTTP headers (vite.config.ts in dev/preview, the host in prod). -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https: wss:; base-uri 'self'; form-action 'self';" />
    <title>Horus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
